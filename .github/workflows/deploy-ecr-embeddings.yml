# Optional embeddings image (PyTorch CPU + sentence-transformers). Not built on every merge.
# Prod runs with EMBEDDINGS_ENABLED=false — use this only if you enable the embeddings profile.
name: Build and push embeddings image to ECR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: commit SHA on main)'
        required: false
        type: string

concurrency:
  group: ecr-api-embeddings
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_EMBEDDINGS_REPO: newspulse-api-embeddings

jobs:
  build-embeddings:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_EMBEDDINGS_REPO }}" --region "${{ env.AWS_REGION }}" 2>/dev/null; then
            aws ecr create-repository \
              --repository-name "${{ env.ECR_EMBEDDINGS_REPO }}" \
              --region "${{ env.AWS_REGION }}" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then TAG="${{ github.sha }}"; fi
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "embeddings_image=${REGISTRY}/${{ env.ECR_EMBEDDINGS_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "embeddings_latest=${REGISTRY}/${{ env.ECR_EMBEDDINGS_REPO }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push embeddings image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: embeddings
          push: true
          tags: |
            ${{ steps.meta.outputs.embeddings_image }}
            ${{ steps.meta.outputs.embeddings_latest }}
          platforms: linux/arm64
          provenance: false

      - name: Summary
        run: |
          echo "### Embeddings image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.embeddings_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.embeddings_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
