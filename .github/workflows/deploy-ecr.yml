# Build and push API image to ECR when changes land on main (e.g. merge PR dev → main).
# Does not run on pushes to dev or other branches.
name: Build and push API to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (default: commit SHA on main)'
        required: false
        type: string

concurrency:
  group: ecr-api-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_API_REPO: newspulse-api

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_API_REPO }}" --region "${{ env.AWS_REGION }}" 2>/dev/null; then
            aws ecr create-repository \
              --repository-name "${{ env.ECR_API_REPO }}" \
              --region "${{ env.AWS_REGION }}" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [[ -z "$TAG" ]]; then TAG="${{ github.sha }}"; fi
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_image=${REGISTRY}/${{ env.ECR_API_REPO }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "api_latest=${REGISTRY}/${{ env.ECR_API_REPO }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}
            ${{ steps.meta.outputs.api_latest }}
          platforms: linux/arm64

      - name: Summary
        run: |
          echo "### API image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.api_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.api_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
