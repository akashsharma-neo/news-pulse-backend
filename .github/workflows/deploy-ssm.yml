name: Deploy to EC2 via SSM

on:
  workflow_dispatch:
    inputs:
      instance_id:
        description: 'EC2 instance ID (i-...)'
        required: true
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run deploy on instance
        run: |
          CMD_ID=$(aws ssm send-command \
            --region "${{ env.AWS_REGION }}" \
            --instance-ids "${{ github.event.inputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "NewsPulse deploy from GitHub Actions" \
            --parameters commands=["/opt/newspulse/deploy/deploy.sh"] \
            --output text \
            --query 'Command.CommandId')
          echo "SSM command id: ${CMD_ID}"
          echo "Check status in AWS Systems Manager → Run Command."
