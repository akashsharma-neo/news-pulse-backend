# Optional LAN / phone testing — merge with base compose:
#   cp docker-compose.lan.example.yml docker-compose.override.yml
#   docker compose up -d
#
# Set NEWSMINE_DEV_HOST in .env (prefer YourMac.local for phone testing; see scripts/dev-host.sh).
# Mirror the host in news-pulse-frontend/.env.local (NEXT_PUBLIC_API_URL, ALLOWED_DEV_ORIGINS).
# For Next.js dev on a phone: npm run dev -- -H 0.0.0.0 -p 3000

services:
  django:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:3000"
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://${NEWSMINE_DEV_HOST:-localhost}:8000/api}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://${NEWSMINE_DEV_HOST:-localhost}:8000/api}
