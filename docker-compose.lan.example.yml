# Optional LAN / phone testing — merge with base compose:
#   cp docker-compose.lan.example.yml docker-compose.override.yml
#   docker compose up -d
#
# Also set DJANGO_ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, and NEXT_PUBLIC_API_URL
# to your machine's LAN IP in .env and news-pulse-frontend/.env.local.
# For Next.js dev on a phone, use host `npm run dev -- -H 0.0.0.0` and ALLOWED_DEV_ORIGINS.

services:
  django:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "3000:3000"
