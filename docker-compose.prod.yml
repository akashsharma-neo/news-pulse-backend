# ===========================
# NewsPulse — Production Compose
# ===========================
# ECR images only (no bind-mounts). No Flower/Metabase.
# TLS via Caddy (deploy/Caddyfile). See docs/aws-deployment.md.
#
# Required in .env on the server:
#   ECR_API_IMAGE, ECR_WEB_IMAGE  (full ECR URIs including tag)
#   CADDY_DOMAIN_WWW, CADDY_DOMAIN_API, CADDY_ACME_EMAIL
#
# Usage (on EC2 after ECR login):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#   docker exec np-django python manage.py migrate
# ===========================

x-app-env: &app-env
  env_file:
    - .env
  environment:
    NEWSMINE_ENV: ${NEWSMINE_ENV:-prod}
    DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
    DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?set DJANGO_ALLOWED_HOSTS}
    DATABASE_NAME: ${DATABASE_NAME:-${POSTGRES_DB}}
    DATABASE_USER: ${DATABASE_USER:-${POSTGRES_USER}}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD}}
    DATABASE_HOST: ${DATABASE_HOST:-postgres}
    DATABASE_PORT: ${DATABASE_PORT:-5432}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
    OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-https://openrouter.ai/api/v1}
    OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-meta-llama/llama-3.1-8b-instruct}
    SUMMARIZE_BATCH_SIZE: ${SUMMARIZE_BATCH_SIZE:-12}
    SUMMARIZE_DELAY_SEC: ${SUMMARIZE_DELAY_SEC:-4}
    SUMMARIZE_MAX_TOKENS: ${SUMMARIZE_MAX_TOKENS:-180}
    SUMMARIZE_FETCH_FULL_BODY: ${SUMMARIZE_FETCH_FULL_BODY:-false}
    EMBEDDINGS_ENABLED: ${EMBEDDINGS_ENABLED:-false}
    BASE_URL: ${BASE_URL:?set BASE_URL}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
    EMBEDDING_MODEL_PATH: /data/embeddings-models
    EMAIL_HOST: ${EMAIL_HOST:-}
    EMAIL_PORT: ${EMAIL_PORT:-587}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: np-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: np-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    <<: *app-env
    image: ${ECR_API_IMAGE:?set ECR_API_IMAGE}
    container_name: np-django
    restart: unless-stopped
    command: >
      gunicorn core.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --threads 2
      --access-logfile -
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    <<: *app-env
    image: ${ECR_API_IMAGE}
    container_name: np-celery
    restart: unless-stopped
    command: >
      celery -A core worker
      --loglevel=info
      --concurrency=4
      --pool=solo
      -Q celery,digest
      --logfile=/var/log/celery/worker.log
    volumes:
      - celery_logs:/var/log/celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A core inspect ping --timeout=5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-embeddings:
    <<: *app-env
    profiles: [embeddings]
    image: ${ECR_EMBEDDINGS_IMAGE:?set ECR_EMBEDDINGS_IMAGE when using embeddings profile}
    container_name: np-celery-embeddings
    restart: unless-stopped
    command: >
      celery -A core worker
      --loglevel=info
      --concurrency=1
      --pool=solo
      -Q embeddings
      --logfile=/var/log/celery/embeddings.log
    environment:
      EMBEDDINGS_ENABLED: "true"
    volumes:
      - celery_logs:/var/log/celery
      - model_cache:/data/embeddings-models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celerybeat:
    <<: *app-env
    image: ${ECR_API_IMAGE}
    container_name: np-celerybeat
    restart: unless-stopped
    command: >
      celery -A core beat
      --loglevel=info
      --logfile=/var/log/celery/beat.log
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    volumes:
      - celery_logs:/var/log/celery
    depends_on:
      celery:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ${ECR_WEB_IMAGE:?set ECR_WEB_IMAGE}
    container_name: np-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_NEWSMINE_ENV: ${NEXT_PUBLIC_NEWSMINE_ENV:-prod}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
    depends_on:
      - django

  caddy:
    image: caddy:2-alpine
    container_name: np-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN_WWW: ${CADDY_DOMAIN_WWW:?set CADDY_DOMAIN_WWW}
      CADDY_DOMAIN_API: ${CADDY_DOMAIN_API:?set CADDY_DOMAIN_API}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:?set CADDY_ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - django
      - frontend

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  celery_logs:
    driver: local
  model_cache:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
