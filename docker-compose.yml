# ===========================
# NewsPulse — Docker Compose
# ===========================
# Services:
#   django      — Gunicorn web server (port 8000)
#   celery      — Celery worker (scrapes, clusters, embeds)
#   celerybeat  — Celery beat scheduler (scrape/cluster/embed)
#   flower      — Celery monitoring UI (port 5555)
#   metabase    — SQL analytics / dashboards (port 3001)
#   redis       — Celery broker + cache
#   postgres    — PostgreSQL 17 + pgvector
#
# Usage:
#   docker compose up -d
#   docker compose logs -f celery   # watch worker logs
#   docker compose down -v          # stop + remove volumes
#
# Environment: copy config/env/dev.example to .env (default NEWSMINE_ENV=dev).
# See docs/environments.md.
# ===========================

x-app-env: &app-env
  env_file:
    - .env
  environment:
    NEWSMINE_ENV: ${NEWSMINE_ENV:-dev}
    NEWSMINE_DEV_HOST: ${NEWSMINE_DEV_HOST:-localhost}
    DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
    DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-change-me}
    DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,${NEWSMINE_DEV_HOST:-localhost}}
    DATABASE_NAME: ${DATABASE_NAME:-${POSTGRES_DB:-newspulse}}
    DATABASE_USER: ${DATABASE_USER:-${POSTGRES_USER:-newsuser}}
    DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-newssecret}}
    DATABASE_HOST: ${DATABASE_HOST:-postgres}
    DATABASE_PORT: ${DATABASE_PORT:-5432}
    CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
    OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
    OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
    OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
    SUMMARIZE_BATCH_SIZE: ${SUMMARIZE_BATCH_SIZE:-12}
    SUMMARIZE_DELAY_SEC: ${SUMMARIZE_DELAY_SEC:-4}
    BASE_URL: ${BASE_URL:-http://${NEWSMINE_DEV_HOST:-localhost}:8000}
    CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://${NEWSMINE_DEV_HOST:-localhost}:3000}
    EMBEDDING_MODEL_PATH: /data/embeddings-models
    EMAIL_HOST: ${EMAIL_HOST:-localhost}
    EMAIL_PORT: ${EMAIL_PORT:-587}
    EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
    EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
    EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-news@newspulse.app}

# Bind-mount all local Python apps so code + templates match the host (dev).
x-app-code-volumes: &app-code-volumes
  - ./core:/app/core
  - ./worker:/app/worker
  - ./articles:/app/articles
  - ./sources:/app/sources
  - ./chat:/app/chat
  - ./digest:/app/digest
  - ./users:/app/users

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: np-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-newspulse}
      POSTGRES_USER: ${POSTGRES_USER:-newsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newssecret}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsuser -d newspulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: np-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    <<: *app-env
    build: .
    container_name: np-django
    restart: unless-stopped
    command: >
      gunicorn core.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --threads 2
      --access-logfile -
    ports:
      - "127.0.0.1:8000:8000"
    volumes: *app-code-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    <<: *app-env
    build: .
    container_name: np-celery
    restart: unless-stopped
    command: >
      celery -A core worker
      --loglevel=info
      --concurrency=4
      --pool=solo
      -Q celery,digest,embeddings
      --logfile=/var/log/celery/worker.log
    volumes:
      - ./core:/app/core
      - ./worker:/app/worker
      - ./articles:/app/articles
      - ./sources:/app/sources
      - ./chat:/app/chat
      - ./digest:/app/digest
      - ./users:/app/users
      - celery_logs:/var/log/celery
      - model_cache:/data/embeddings-models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "celery -A core inspect ping --timeout=5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celerybeat:
    <<: *app-env
    build: .
    container_name: np-celerybeat
    restart: unless-stopped
    command: >
      celery -A core beat
      --loglevel=info
      --logfile=/var/log/celery/beat.log
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
    volumes:
      - ./core:/app/core
      - ./worker:/app/worker
      - celery_logs:/var/log/celery
    depends_on:
      celery:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    build: .
    container_name: np-flower
    restart: unless-stopped
    command: >
      celery -A core flower
      --port=5555
      --broker=redis://redis:6379/0
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASS:-admin}
      --persist=false
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
      - celery

  metabase:
    image: metabase/metabase:v0.55.4
    container_name: np-metabase
    restart: unless-stopped
    ports:
      - "127.0.0.1:${METABASE_PORT:-3001}:3000"
    environment:
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_SECRET_KEY:-dev-only-metabase-encryption-key}
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  frontend:
    build:
      context: ../news-pulse-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_NEWSMINE_ENV: ${NEXT_PUBLIC_NEWSMINE_ENV:-dev}
        # Browser calls the API from the host — use 127.0.0.1 when compose binds 127.0.0.1:8000.
        # For phone/LAN, set NEXT_PUBLIC_API_URL in .env or use docker-compose.lan.example.yml.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8000/api}
    container_name: np-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_NEWSMINE_ENV: ${NEXT_PUBLIC_NEWSMINE_ENV:-dev}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8000/api}
    depends_on:
      - django

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  celery_logs:
    driver: local
  model_cache:
    driver: local
  metabase_data:
    driver: local
